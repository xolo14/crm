<!doctype html>
<html lang="en-IN" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <title>Syncpedia CRM — Login</title>
    <meta name="description" content="Internal CRM for Syncpedia partner organizations. Public course applications are at /apply." />
    <meta name="author" content="Syncpedia" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta property="og:title" content="Syncpedia CRM" />
    <meta property="og:description" content="EdTech sales, leads, and operations platform for training organizations in India." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://crm.syncpedia.in/" />
    <meta property="og:image" content="https://crm.syncpedia.in/logo.png" />
    <meta property="og:locale" content="en_IN" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@syncpedia" />
    <meta name="twitter:image" content="https://crm.syncpedia.in/logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://crm.syncpedia.in" crossorigin />
    <link rel="dns-prefetch" href="https://crm.syncpedia.in" />
    <!-- Loaded here (not via CSS @import) so the fonts CSS downloads in parallel with the app bundle -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>

  <body>
    <script>
      (function () {
        try {
          var key = "crm-ui-theme";
          var stored = localStorage.getItem(key);
          if (!stored || (stored !== "light" && stored !== "dark" && stored !== "system")) {
            try {
              var legacy = localStorage.getItem("theme");
              if (legacy === "light" || legacy === "dark" || legacy === "system") {
                stored = legacy;
                localStorage.setItem(key, legacy);
              }
            } catch (e) {}
            if (!stored) {
              try {
                var g = JSON.parse(localStorage.getItem("crm_general_settings") || "{}");
                if (g.theme === "light" || g.theme === "dark" || g.theme === "system") {
                  stored = g.theme;
                  localStorage.setItem(key, g.theme);
                }
              } catch (e2) {}
            }
          }
          var theme = stored || "system";
          var dark =
            theme === "dark" ||
            (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", !!dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (err) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
